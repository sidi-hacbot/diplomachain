<!DOCTYPE html>
<html>
<head>
    <title>Vérifier - DiplomaChain</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>🔍 Vérifier une attestation</h1>
                <p><a href="index.html">← Retour à l'accueil</a></p>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Matricule</label>
                    <input type="text" id="matricule" placeholder="Ex: 78dfdf">
                </div>
                <div class="form-group">
                    <label>Type d'attestation</label>
                    <select id="typeAttestation">
                        <option value="LICENCE">Licence</option>
                        <option value="MASTER">Master</option>
                        <option value="DOCTORAT">Doctorat</option>
                    </select>
                </div>
                <button id="verifyBtn" class="btn-primary">🔍 Vérifier</button>
                <div id="result"></div>
            </div>
        </div>
    </div>
    
    <script src="js/verify.js"></script>
</body>
</html>
